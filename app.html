<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <title>Nora</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/assets/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css?v=11">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="top-bar-left">
                <a href="javascript:void(0)" onclick="showSection('search')" class="top-bar-logo">
                    <div class="logo-sm">
                        <span class="material-icons-round">shield</span>
                    </div>
                    <span>Nora</span>
                </a>
            </div>
            <div class="top-bar-right">
                <button class="icon-btn" onclick="showSection('ai')" title="AI Assistant">
                    <span class="material-icons-round">auto_awesome</span>
                </button>
                <button class="icon-btn" onclick="handleSignOut()" title="Sign Out">
                    <span class="material-icons-round">logout</span>
                </button>
            </div>
        </header>

        <div class="app-body">
        <!-- Desktop Sidebar Nav (hidden on mobile) -->
        <nav class="desktop-nav">
            <button class="nav-item active" onclick="showSection('search')" data-section="search">
                <span class="material-icons-round">home</span>
                Home
            </button>
            <button class="nav-item" onclick="showSection('ai')" data-section="ai">
                <span class="material-icons-round">auto_awesome</span>
                AI Assistant
            </button>
            <button class="nav-item" onclick="showSection('lookup')" data-section="lookup">
                <span class="material-icons-round">biotech</span>
                Lookup
            </button>
            <button class="nav-item" onclick="showSection('profile')" data-section="profile">
                <span class="material-icons-round">person</span>
                Profile
            </button>
        </nav>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Recall Alerts Banner -->
            <div id="recall-alerts-banner" class="recall-banner" style="display:none">
                <div class="recall-banner-header">
                    <span class="material-icons-round">notification_important</span>
                    <strong>FDA Recall Alerts</strong>
                    <button class="recall-dismiss-all" onclick="dismissAllRecalls()" title="Dismiss all">
                        <span class="material-icons-round">close</span>
                    </button>
                </div>
                <div id="recall-alerts-list"></div>
            </div>

            <!-- Search / Home Section -->
            <div id="section-search" class="page-section active">
                <!-- AI Quick Ask -->
                <div class="ai-section">
                    <div class="ai-card">
                        <div class="ai-card-header">
                            <span class="material-icons-round">auto_awesome</span>
                            Ask Nora
                        </div>
                        <div class="ai-input-group">
                            <input type="text" id="ai-quick-input"
                                   placeholder="e.g. 'Safe Italian restaurants near Strip District'"
                                   onkeydown="if(event.key==='Enter') askNora()">
                            <button onclick="askNora()">
                                <span class="material-icons-round">send</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Search -->
                <div class="search-container">
                    <span class="material-icons-round">search</span>
                    <input type="text" class="search-input" id="restaurant-search"
                           placeholder="Search restaurants..."
                           oninput="searchRestaurants(this.value)">
                </div>

                <!-- Restaurant List -->
                <div id="restaurant-list">
                    <div class="loading-overlay">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>

            <!-- Restaurant Detail Section -->
            <div id="section-restaurant" class="page-section">
                <button class="back-btn" onclick="showSection('search')">
                    <span class="material-icons-round">arrow_back</span>
                    Back to search
                </button>
                <div id="restaurant-detail"></div>
            </div>

            <!-- AI Section -->
            <div id="section-ai" class="page-section">
                <button class="back-btn" onclick="showSection('search')">
                    <span class="material-icons-round">arrow_back</span>
                    Back
                </button>
                <div class="section-header">
                    <h2>AI Assistant</h2>
                </div>
                <div class="ai-card" style="margin-bottom: 20px">
                    <div class="ai-card-header">
                        <span class="material-icons-round">auto_awesome</span>
                        Ask Nora anything about food safety
                    </div>
                    <div class="ai-input-group">
                        <input type="text" id="ai-full-input"
                               placeholder="e.g. 'Does pad thai usually contain peanuts?'"
                               onkeydown="if(event.key==='Enter') askNoraFull()">
                        <button onclick="askNoraFull()">
                            <span class="material-icons-round">send</span>
                        </button>
                    </div>
                </div>
                <div id="ai-responses"></div>
            </div>

            <!-- Ingredient Lookup Section -->
            <div id="section-lookup" class="page-section">
                <div class="section-header">
                    <h2>Ingredient Lookup</h2>
                </div>
                <div class="lookup-intro card">
                    <span class="material-icons-round" style="color:var(--accent);font-size:28px">biotech</span>
                    <p>Search any ingredient to check for allergens across multiple databases.</p>
                </div>
                <div class="search-container" style="margin-top:12px">
                    <span class="material-icons-round">search</span>
                    <input type="text" class="search-input" id="ingredient-search"
                           placeholder="e.g. tahini, casein, miso..."
                           oninput="debounceIngredientSearch(this.value)">
                </div>
                <div id="ingredient-results"></div>
            </div>

            <!-- Profile Section -->
            <div id="section-profile" class="page-section">
                <div class="section-header">
                    <h2>My Profile</h2>
                    <button class="btn btn-sm btn-outline" onclick="window.location.href='/onboarding.html'">
                        <span class="material-icons-round">edit</span> Edit
                    </button>
                </div>
                <div id="profile-content"></div>
            </div>
        </main>
        </div><!-- /app-body -->

        <!-- Bottom Nav -->
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="showSection('search')" data-section="search">
                <span class="material-icons-round">home</span>
                Home
            </button>
            <button class="nav-item" onclick="showSection('ai')" data-section="ai">
                <span class="material-icons-round">auto_awesome</span>
                AI
            </button>
            <button class="nav-item" onclick="showSection('lookup')" data-section="lookup">
                <span class="material-icons-round">biotech</span>
                Lookup
            </button>
            <button class="nav-item" onclick="showSection('profile')" data-section="profile">
                <span class="material-icons-round">person</span>
                Profile
            </button>
        </nav>
    </div>

    <!-- Menu Item Detail Modal -->
    <div id="item-detail-modal" class="modal-overlay" onclick="if(event.target===this)closeItemDetail()">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Dish Details</h3>
                <button class="icon-btn" onclick="closeItemDetail()">
                    <span class="material-icons-round">close</span>
                </button>
            </div>
            <div id="item-detail-body"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="/js/config.js?v=11"></script>
    <script src="/js/auth.js?v=11"></script>
    <script src="/js/app.js?v=11"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
